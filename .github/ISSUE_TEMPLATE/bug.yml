name: "🐛 Bug Report"
description: "Fehler melden"
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Fehlerbeschreibung"
      description: "Was passiert und was sollte passieren?"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "Schritte zur Reproduktion"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Lemma Version"
      placeholder: "z.B. 0.8.5"
  - type: dropdown
    id: area
    attributes:
      label: "Bereich"
      options:
        - "area:retrieval"
        - "area:db"
        - "area:mcp"
        - "area:security"
        - "area:guides"
        - "area:sessions"
        - "area:evals"
  - type: textarea
    id: logs
    attributes:
      label: "Relevante Logs"
      render: shell
